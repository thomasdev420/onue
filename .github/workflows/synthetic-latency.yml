# Scheduled synthetic latency from GitHub-hosted runners (typically US Azure) → your Vercel origin.
# For wall RTT comparable to EU users, also run probe:synthetic from a machine in that region.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AMPLY_PROD_URL     — e.g. https://www.useamply.com
#   AMPLY_API_KEYS     — comma-separated server keys and/or POST probe (or single amply_sk_ user key)
#   AMPLY_ROUTE_BEARER_TOKEN — optional; if set, preferred over AMPLY_API_KEYS for Bearer (user key)
#
# Confirm in GitHub: repo → Settings → Secrets and variables → Actions — both names must be listed.
# Full checklist: deploy-setup.md § "GitHub Actions — synthetic latency workflow".
# Optional local verify: `npm run check:gha-secrets` (requires `gh auth login`).
#
# To change sample size, edit AMPLY_PROBE_ITERATIONS below.
# Optional env: AMPLY_PROBE_FAIL_WALL_P95_MS / AMPLY_PROBE_FAIL_COMPUTE_P95_MS for hard gates.
# AMPLY_PROBE_ROUTE_MINIMAL=1 — smaller POST body for less upload/parse variance (stable US runner → iad1).
# After each run: Actions → this workflow → latest run → Artifacts → synthetic-probe-log (JSON includes route.status.compute_p95_ms).

name: Synthetic API latency

on:
  workflow_dispatch:
  schedule:
    - cron: '20 */6 * * *'

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check secrets and run synthetic probe
        env:
          AMPLY_PROD_URL: ${{ secrets.AMPLY_PROD_URL }}
          AMPLY_API_KEYS: ${{ secrets.AMPLY_API_KEYS }}
          AMPLY_ROUTE_BEARER_TOKEN: ${{ secrets.AMPLY_ROUTE_BEARER_TOKEN }}
          AMPLY_PROBE_ITERATIONS: '60'
          AMPLY_PROBE_WARMUP: '1'
          AMPLY_PROBE_ROUTE_MINIMAL: '1'
        run: |
          if [ -z "$AMPLY_PROD_URL" ]; then
            echo '::error::Missing repository secret AMPLY_PROD_URL. GitHub → Settings → Secrets and variables → Actions → New repository secret.'
            exit 1
          fi
          if [ -z "$AMPLY_API_KEYS" ] && [ -z "$AMPLY_ROUTE_BEARER_TOKEN" ]; then
            echo '::error::Need AMPLY_API_KEYS and/or AMPLY_ROUTE_BEARER_TOKEN (Bearer for POST /api/v1/route).'
            exit 1
          fi
          echo '::notice::Probing production from GitHub-hosted runner (US Azure; compare compute_p95 across runs).'
          set -o pipefail
          npm run probe:synthetic -- "$AMPLY_PROD_URL" 2>&1 | tee probe-log.txt

      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-probe-log
          path: probe-log.txt
          retention-days: 30
