<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Design Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #36aeea 100%);
            min-height: 100vh;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* 1. Sidebar glass effect */
        .sidebar {
            background: rgba(255, 255, 255, 0.55); /* semi-transparent white */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-right: 1.5px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.12);
            color: rgba(30,41,59,0.82);
            position: fixed;
            width: 256px;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(.4,0,.2,1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar-header {
            position: relative;
            height: 64px;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .sidebar-header.collapsed {
            justify-content: center;
        }

        .back-arrow {
            position: absolute;
            top: 32px;
            left: 18px;
            width: 20px;
            height: 20px;
            color: #1e293b;
            cursor: pointer;
            z-index: 10;
        }

        .back-arrow:hover {
            color: #64748b;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #1e293b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
            margin-left: auto;
        }

        .toggle-btn:hover {
            color: #64748b;
        }

        .sidebar-nav {
            margin-top: 8px;
            padding: 0 16px;
            flex: 1;
        }

        .nav-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            margin: 0;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 5px 12px;
            color: #1e293b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid transparent;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.28);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 2px 8px 0 rgba(31,38,135,0.06) inset;
            color: rgba(30,41,59,0.82);
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
        }

        .nav-link.settings-support {
            color: rgba(30,41,59,0.82);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .nav-icon svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        .nav-text {
            font-size: 14px;
        }

        .nav-divider {
            margin: 16px 0;
        }

        .sidebar-footer {
            padding: 16px;
            box-sizing: border-box;
        }

        .upgrade-btn {
            position: relative;
            background: linear-gradient(90deg, #3953e6 0%, #36aeea 100%);
            border: none;
            border-radius: 16px;
            padding: 12px 24px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.45), 0 1.5px 8px 0 rgba(255,255,255,0.08) inset;
            cursor: pointer;
            outline: none;
            display: block;
            text-align: center;
            transition: transform 0.1s ease;
            letter-spacing: 0.01em;
            overflow: hidden;
            width: 100%;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        .upgrade-btn:hover {
            transform: scale(1.03);
        }

        .upgrade-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%;
            border-radius: 16px 16px 40% 40%/16px 16px 60% 60%;
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 100%);
            pointer-events: none;
            z-index: 1;
            filter: blur(0.5px);
        }

        .upgrade-btn span {
            position: relative;
            z-index: 2;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
        }



        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: rgba(30,41,59,0.82);
            margin: 0;
        }

        .user-email {
            font-size: 12px;
            color: rgba(30,41,59,0.82);
            margin: 0;
        }

        .sign-out-btn {
            color: #3b82f6;
            font-size: 12px;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 4px;
        }

        .sign-out-btn:hover {
            color: #2563eb;
        }

        .loading-text {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
        }

        .not-signed-in {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            text-align: center;
        }

        .sign-in-link {
            color: #3b82f6;
            font-size: 12px;
            text-decoration: underline;
            cursor: pointer;
        }

        .sign-in-link:hover {
            color: #2563eb;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 256px;
            transition: margin-left 0.3s ease;
            padding: 24px;
        }

        .main-content.expanded {
            margin-left: 80px;
        }

        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
        }



        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeIn 0.3s ease;
        }

        /* CSS for layered glassmorphism */
        body {
            background: linear-gradient(135deg, #667eea 0%, #36aeea 100%);
            min-height: 100vh;
        }

        .sidebar.glass-card {
            position: fixed;
            top: 12px;
            left: 12px;
            bottom: 12px;
            width: 288px;
            height: auto;
            border-radius: 32px;
            isolation: isolate;
            box-shadow: 0px 6px 24px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
            background: transparent;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 0;
            border-radius: 32px;
            box-shadow: inset 0 0 20px -5px rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .sidebar.glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            filter: url(#glass-distortion);
            isolation: isolate;
            pointer-events: none;
        }

        .sidebar-content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        /* Sidebar minimize/restore transitions */
        .sidebar {
            transition: transform 0.38s cubic-bezier(.4,0,.2,1), opacity 0.28s;
        }

        body.sidebar-minimized .sidebar {
            transform: translateX(-120%) scale(0.98);
            opacity: 0;
            pointer-events: none;
        }

        /* Hamburger button: positioned in sidebar when open, edge when minimized */
        .sidebar-hamburger {
            position: absolute;
            top: 28px;
            right: 18px;
            left: auto;
            z-index: 10;
            width: 28px;
            height: 28px;
            background: none;
            border: none;
            border-radius: 0;
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(.4,0,.2,1);
            opacity: 1;
            transform: scale(1);
        }
        
        body.sidebar-minimized .sidebar-hamburger {
            position: fixed;
            top: 20px;
            left: 8px;
            right: auto;
            z-index: 2000;
            opacity: 1;
            transform: scale(1);
            animation: bubblePop 0.4s cubic-bezier(.4,0,.2,1);
        }
        
        @keyframes bubblePop {
            0% { 
                opacity: 0; 
                transform: scale(0.6) translateX(-20px); 
            }
            50% { 
                opacity: 1; 
                transform: scale(1.1) translateX(0); 
            }
            100% { 
                opacity: 1; 
                transform: scale(1) translateX(0); 
            }
        }
        /* Responsive: hamburger always accessible on mobile */
        @media (max-width: 600px) {
            .sidebar-hamburger {
                width: 40px;
                height: 40px;
            }
            body.sidebar-minimized .sidebar-hamburger {
                top: 12px;
                left: 4px;
            }
            .sidebar {
                top: 8px;
                left: 8px;
                bottom: 8px;
                width: 92vw;
                min-width: 0;
                max-width: 340px;
            }
        }
        /* Remove all other collapse/expand controls */
        .toggle-btn, .sidebar-header.collapsed { display: none !important; }
        /* Hide nav text and footer when minimized */
        body.sidebar-minimized .nav-text,
        body.sidebar-minimized .sidebar-footer { display: none !important; }
        /* Center icons when minimized */
        body.sidebar-minimized .nav-link { justify-content: center; }
        /* Accessibility focus ring for hamburger */
        .sidebar-hamburger:focus { outline: 2px solid #3953e6; outline-offset: 2px; }


    </style>
</head>
<body>
    <!-- Abstract background objects -->
    <div style="position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;"></div>

    <!-- SVG Filter for glass distortion -->
    <svg width="0" height="0" style="position:absolute; overflow:hidden">
      <defs>
        <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise"/>
          <feGaussianBlur in="noise" stdDeviation="2" result="blurred"/>
          <feDisplacementMap in="SourceGraphic" in2="blurred" scale="77" xChannelSelector="R" yChannelSelector="G"/>

    <script>
        // Sidebar minimal toggle logic only
        const sidebar = document.getElementById('sidebar');
        const sidebarHamburger = document.getElementById('sidebarHamburger');
        let isMinimized = false;
        
        function toggleSidebar() {
            isMinimized = !isMinimized;
            if (isMinimized) {
                document.body.classList.add('sidebar-minimized');
                sidebarHamburger.focus();
            } else {
                document.body.classList.remove('sidebar-minimized');
                sidebar.querySelector('.sidebar-content').focus();
            }
        }
        
        sidebarHamburger.addEventListener('click', toggleSidebar);
        // Keyboard accessibility
        sidebarHamburger.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') toggleSidebar(); });

        // Demo Google sign-in logic
        const authSection = document.getElementById('authSection');
        let signedIn = false;
        function renderAuth() {
          if (!signedIn) {
            authSection.innerHTML = `<button id="googleSignInBtn" style="width:100%;display:flex;align-items:center;gap:10px;justify-content:center;padding:10px 0;border-radius:12px;border:none;background:rgba(255,255,255,0.22);backdrop-filter:blur(8px);font-size:15px;font-weight:500;color:rgba(30,41,59,0.82);cursor:pointer;transition:background 0.2s;"><svg width='20' height='20' viewBox='0 0 48 48'><g><path fill='#4285F4' d='M24 9.5c3.54 0 6.7 1.22 9.19 3.23l6.87-6.87C35.64 2.39 30.23 0 24 0 14.82 0 6.73 5.82 2.69 14.09l8.01 6.22C12.36 13.7 17.68 9.5 24 9.5z'/><path fill='#34A853' d='M46.1 24.55c0-1.64-.15-3.22-.42-4.74H24v9.01h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.19 5.6C43.98 37.13 46.1 31.3 46.1 24.55z'/><path fill='#FBBC05' d='M10.7 28.31c-1.01-2.99-1.01-6.23 0-9.22l-8.01-6.22C.67 16.18 0 19.01 0 22c0 2.99.67 5.82 1.89 8.13l8.81-6.82z'/><path fill='#EA4335' d='M24 48c6.23 0 11.46-2.06 15.28-5.6l-7.19-5.6c-2.01 1.35-4.59 2.15-8.09 2.15-6.32 0-11.64-4.2-13.3-9.81l-8.81 6.82C6.73 42.18 14.82 48 24 48z'/><path fill='none' d='M0 0h48v48H0z'/></g></svg> Sign in with Google</button>`;
            document.getElementById('googleSignInBtn').onclick = () => { signedIn = true; renderAuth(); };
          } else {
            authSection.innerHTML = `<div class='user-profile' style='margin-top:0;'>
              <img src='https://randomuser.me/api/portraits/men/32.jpg' alt='Profile' class='user-avatar' style='width:40px;height:40px;border-radius:50%;' />
              <div class='user-info'>
                <p class='user-name' style='margin:0;'>Demo User</p>
                <p class='user-email' style='margin:0;'>demo.user@gmail.com</p>
                <button class='sign-out-btn' style='color:#3b82f6;font-size:12px;background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:4px;'>Sign out</button>
              </div>
            </div>`;
            authSection.querySelector('.sign-out-btn').onclick = () => { signedIn = false; renderAuth(); };
          }
        }
        renderAuth();
    </script>
