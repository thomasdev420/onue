[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "amply-sdk"
version = "0.1.0"
description = "Official Python client for the Amply routing API (POST /api/v1/route)."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Amply" }]
keywords = ["amply", "vector", "routing", "api-client"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]

[project.urls]
Homepage = "https://www.useamply.com"
Repository = "https://github.com/thomasdev420/onue"
